services:
  api:
    build:
      context: .
      target: api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file:
      - path: .env
        required: false
    environment:
      MPLCONFIGDIR: /tmp/matplotlib
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - minio

  worker:
    profiles: ["gpu"]
    build:
      context: .
      target: worker
    command: >-
      /bin/bash -lc "python -m app.tasks.preload_models &&
      celery -A app.tasks.celery_app.celery_app worker --loglevel=INFO --concurrency=3"
    env_file:
      - path: .env
        required: false
    environment:
      HF_HOME: /root/.cache/huggingface
      MPLCONFIGDIR: /tmp/matplotlib
      TORCH_HOME: /root/.cache/torch
    depends_on:
      - postgres
      - redis
      - minio
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    volumes:
      - model-cache:/root/.cache

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${DB_USER:-soundweaver}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-soundweaver}
      POSTGRES_DB: ${DB_NAME:-soundweaver}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-soundweaver}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-soundweaver-secret}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  minio-data:
  model-cache:
