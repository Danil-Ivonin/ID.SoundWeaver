services:
  api:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file:
      - path: .env
        required: false
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - minio

  worker:
    build: .
    command: celery -A app.tasks.celery_app.celery_app worker --loglevel=INFO --concurrency=1 --pool=solo
    env_file:
      - path: .env
        required: false
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    depends_on:
      - postgres
      - redis
      - minio
    volumes:
      - model-cache:/root/.cache

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: soundweaver
      POSTGRES_USER: soundweaver
      POSTGRES_PASSWORD: soundweaver
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: soundweaver
      MINIO_ROOT_PASSWORD: soundweaver-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  postgres-data:
  minio-data:
  model-cache:
